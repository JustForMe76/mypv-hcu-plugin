name: Build HCU Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up QEMU (für ARM Architektur)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Export Container
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/arm64
          outputs: type=oci,dest=mypv-plugin.tar

      - name: Compress to tar.gz
        run: gzip mypv-plugin.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: mypv-hcu-plugin
          path: mypv-plugin.tar.gz
