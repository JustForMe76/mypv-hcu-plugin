name: Build HCU Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Packe Dateien (Tarball)
        run: tar -czvf mypv-plugin.tar.gz index.js plugin.json package.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: mypv-hcu-plugin
          path: mypv-plugin.tar.gz
