name: Build HCU Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build OCI Image
        run: |
          docker build -t my-pv-plugin:1.0.0 .
          docker save my-pv-plugin:1.0.0 > my-pv-plugin.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hcu-plugin-package
          path: my-pv-plugin.tar
